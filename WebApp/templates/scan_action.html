{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h1 class="mb-3">Scanning Devices</h1>
    <p class="text-muted">
        Scanning LAN for IoT devices. Results will appear below in real time.
    </p>

    <!-- Status Card -->
    <div class="card mb-4 shadow-sm">
        <div class="card-body text-center">
            <h5 class="card-title">Scan Status</h5>
            <p id="status" class="fs-5 fw-bold text-primary">
                Starting scan...
            </p>
        </div>
    </div>

    <!-- Results -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Discovered Devices</h5>

            <ul id="results" class="list-group list-group-flush">
                <!-- Devices will be inserted here -->
            </ul>

        </div>
    </div>

    <!-- Buttons -->
    <div class="mt-4">
        <a href="{{ url_for('scan_action') }}" class="btn btn-primary btn-lg w-100 mb-2">
            Restart Scan
        </a>

        {% if devices_last %}
        <a href="{{ url_for('last_scan') }}" class="btn btn-success btn-lg w-100">
            See Scan History
        </a>
        {% endif %}
    </div>

</div>

<script>
function pollStatus() {
    fetch("/scan/status")
        .then(r => r.json())
        .then(data => {

            const statusEl = document.getElementById("status");

            if (data.running) {
                statusEl.textContent = "Scanning...";
                statusEl.classList.remove("text-success");
                statusEl.classList.add("text-primary");
            } else {
                statusEl.textContent = "Scan Complete";
                statusEl.classList.remove("text-primary");
                statusEl.classList.add("text-success");
            }

            const list = document.getElementById("results");
            list.innerHTML = "";

            data.devices.forEach(d => {
                const li = document.createElement("li");
                li.className = "list-group-item";
                li.textContent = d;
                list.appendChild(li);
            });

            if (data.running) {
                setTimeout(pollStatus, 1000);
            }
        });
}

pollStatus();
</script>

{% endblock %}
