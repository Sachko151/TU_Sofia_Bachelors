{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-end mb-3">
    <a href="{{ url_for('add_device') }}" class="btn btn-success btn-icon">
        <i class="bi bi-plus-lg"></i> Add Device
    </a>
</div>

<!-- Devices Dashboard -->
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for item in items %}
        <div class="col">
            <div class="card p-3 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ item.name }}</h5>
                    <p class="text-muted mb-2">IP: {{ item.ip or "Not set" }}</p>

                    <!-- Device Controls -->
                    <div class="device-toggle mt-3 d-flex justify-content-between align-items-center">

                        <!-- Toggle ON/OFF -->
                        <form action="{{ url_for('toggle_device', id=item.id) }}" method="POST">
                            <input type="checkbox" name="state" {% if item.state %}checked{% endif %} onchange="this.form.submit()">
                        </form>

                        <!-- Action Buttons -->
                        <div class="d-flex gap-2">
                            <a href="{{ url_for('device_detail', id=item.id) }}" class="btn btn-primary btn-sm btn-icon">
                                <i class="bi bi-speedometer2"></i> Details
                            </a>
                            <a href="{{ url_for('edit', id=item.id) }}" class="btn btn-warning btn-sm btn-icon">
                                <i class="bi bi-pencil-square"></i> Edit
                            </a>
                            <a href="{{ url_for('ping', id=item.id) }}" class="btn btn-info btn-sm btn-icon">
                                <i class="bi bi-antenna-radiowaves"></i> Ping
                            </a>
                            <a href="{{ url_for('delete', id=item.id) }}" class="btn btn-danger btn-sm btn-icon" onclick="return confirm('Are you sure?');">
                                <i class="bi bi-trash"></i> Delete
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

{% endblock %}
