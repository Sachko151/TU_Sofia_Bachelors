{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow-sm mx-auto" style="max-width: 600px;">

    <h3 class="mb-3">
        Add New Device
    </h3>

    <form method="POST" class="d-flex flex-column gap-3">

        <!-- DEVICE NAME -->
        <div>
            <label class="form-label">Device Name</label>

            <input
                type="text"
                name="name"
                class="form-control"
                placeholder="Device name"
                required>
        </div>

        <!-- IP ADDRESS -->
        <div>
            <label class="form-label">IP Address</label>

            <input
                type="text"
                name="ip"
                class="form-control"
                placeholder="192.168.1.100">
        </div>

        <!-- ECU TYPE -->
        <div>

            <label class="form-label">
                ECU Type
            </label>

            <select
                name="ecu_type"
                id="ecu_type"
                class="form-select"
                required>

                {% for t in ecu_types %}

                <option value="{{ t.value }}">
                    {{ t.name.replace("_", " ").title() }}
                </option>

                {% endfor %}

            </select>

        </div>

        <!-- ====================================================== -->
        <!-- RTSP CAMERA SETTINGS -->
        <!-- ====================================================== -->

        <div id="camera_fields" style="display: none;">

            <div class="card border-primary p-3">

                <h5 class="mb-3">
                    Camera Configuration
                </h5>

                <!-- RTSP URL -->
                <div class="mb-3">

                    <label class="form-label">
                        RTSP Stream URL
                    </label>

                    <input
                        type="text"
                        name="rtsp_url"
                        class="form-control"
                        placeholder="rtsp://192.168.1.50:554/stream">

                    <div class="form-text">

                        Examples:

                        <br>

                        <code>
                            rtsp://192.168.1.50:554/stream
                        </code>

                        <br>

                        <code>
                            rtsp://user:password@192.168.1.50:554/stream1
                        </code>

                    </div>

                </div>

                <!-- CAMERA NOTES -->
                <div class="alert alert-info mb-0">

                    <strong>Note:</strong>

                    This RTSP stream will automatically be converted
                    to HLS for browser playback.

                </div>

            </div>

        </div>

        <!-- ====================================================== -->

        <div class="d-flex justify-content-between mt-2">

            <a href="{{ url_for('index') }}"
               class="btn btn-secondary btn-icon">

                <i class="bi bi-arrow-left"></i>
                Cancel

            </a>

            <button type="submit"
                    class="btn btn-success btn-icon">

                <i class="bi bi-check-lg"></i>
                Add Device

            </button>

        </div>

    </form>
</div>

<!-- ========================================================== -->
<!-- DYNAMIC ECU FORM LOGIC -->
<!-- ========================================================== -->

<script>

document.addEventListener("DOMContentLoaded", function () {

    const ecuSelect = document.getElementById("ecu_type");

    const cameraFields = document.getElementById("camera_fields");

    function updateFields() {

        const selectedType = ecuSelect.value;

        if (selectedType === "ip_camera") {

            cameraFields.style.display = "block";

        }
        else {

            cameraFields.style.display = "none";
        }
    }

    ecuSelect.addEventListener("change", updateFields);

    updateFields();
});

</script>

{% endblock %}
