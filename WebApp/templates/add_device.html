{% extends "base.html" %}
{% block content %}

<div class="card p-4 shadow-sm mx-auto" style="max-width: 500px;">
    <h3 class="mb-3">Add New Device</h3>

    <form method="POST" class="d-flex flex-column gap-3">
        <input type="text" name="name" class="form-control" placeholder="Device name" required>
        <input type="text" name="ip" class="form-control" placeholder="Device IP (optional)">

        <div class="d-flex justify-content-between">
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-icon">
                <i class="bi bi-arrow-left"></i> Cancel
            </a>
            <button type="submit" class="btn btn-success btn-icon">
                <i class="bi bi-check-lg"></i> Add Device
            </button>
        </div>
    </form>
</div>

{% endblock %}
